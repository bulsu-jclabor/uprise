name: uprise
description: UPRISE App
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  http: ^1.2.0

  # FIREBASE
  cloud_firestore: ^5.6.12
  firebase_core: ^3.15.2 
  firebase_auth: ^5.4.0
  firebase_storage: ^12.4.10

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  fl_chart: ^1.2.0

  # Utilities
  intl: ^0.20.2
  share_plus: ^7.0.0
  file_picker: ^8.0.0
  image_picker: ^1.0.7
  excel: ^4.0.0
  csv: ^5.1.1
  mailer: ^6.0.1
  printing: ^5.12.0
  pdf: ^3.10.7
  shared_preferences: ^2.5.5
  flutter_image_compress: ^2.1.0
  url_launcher: ^6.3.2
  file_saver: ^0.4.0
  mobile_scanner: ^7.2.0
  universal_html: ^2.3.0
  crypto: ^3.0.3
  path_provider: ^2.1.0
  open_file: ^3.3.2
  cross_file: ^0.3.5+2
  

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
    - assets/images/bg_pattern.png